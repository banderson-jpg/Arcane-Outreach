<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arcane Baseball | Coach Outreach</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, 'Times New Roman', serif; background: #f4f4ee; color: #1a1a2e; min-height: 100vh; }

  /* ── HEADER ── */
  #header {
    background: #fff; border-bottom: 1px solid #e0ddd0;
    padding: 0 24px; box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    position: sticky; top: 0; z-index: 100;
  }
  #header-inner {
    max-width: 1300px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0 0;
  }
  #brand { display: flex; align-items: baseline; gap: 10px; }
  #brand-name { font-size: 11px; font-weight: 800; letter-spacing: .2em; color: #b8860b; text-transform: uppercase; }
  #brand-sub { font-size: 13px; color: #bbb; letter-spacing: .06em; }
  #header-stats { display: flex; gap: 20px; }
  .hstat { text-align: center; }
  .hstat-num { font-size: 18px; font-weight: 800; color: #b8860b; line-height: 1; }
  .hstat-lbl { font-size: 9px; color: #bbb; letter-spacing: .08em; text-transform: uppercase; margin-top: 1px; }
  #header-tabs { display: flex; margin-top: 8px; }
  .htab {
    background: none; border: none; cursor: pointer;
    padding: 8px 18px; font-size: 11px; font-weight: 700;
    letter-spacing: .08em; text-transform: uppercase;
    color: #aaa; border-bottom: 2px solid transparent;
    font-family: Georgia, serif; transition: color .15s;
  }
  .htab.active { color: #b8860b; border-bottom-color: #b8860b; }

  /* progress bars in header */
  #header-progress { display: flex; gap: 14px; align-items: center; }
  .prog-wrap { min-width: 140px; }
  .prog-label { font-size: 10px; color: #aaa; display: flex; justify-content: space-between; margin-bottom: 3px; }
  .prog-label span:last-child { font-weight: 700; color: #b8860b; }
  .prog-bar { height: 4px; background: #eee; border-radius: 2px; overflow: hidden; }
  .prog-fill { height: 100%; background: linear-gradient(90deg,#b8860b,#d4a843); border-radius: 2px; transition: width .5s; }
  #admin-btn {
    background: none; border: 1px solid #e0e0d8; border-radius: 7px;
    padding: 6px 14px; font-size: 11px; color: #aaa; cursor: pointer;
    font-family: Georgia, serif; transition: all .15s;
  }
  #admin-btn:hover { border-color: #b8860b; color: #b8860b; }
  #admin-btn.active { background: #b8860b; color: #fff; border-color: #b8860b; }

  /* ── LAYOUT ── */
  #app { display: flex; height: calc(100vh - 90px); }

  /* ── LEFT LIST ── */
  #list-panel {
    width: 320px; flex-shrink: 0; background: #fff;
    border-right: 1px solid #e8e8e0;
    display: flex; flex-direction: column; overflow: hidden;
  }
  #filters { padding: 10px 12px; border-bottom: 1px solid #f0f0ea; display: flex; flex-direction: column; gap: 6px; }
  #filters input, #filters select {
    background: #f8f8f4; border: 1px solid #e8e8e0; border-radius: 7px;
    padding: 7px 10px; font-size: 12px; color: #333; width: 100%;
    font-family: Georgia, serif;
  }
  #filter-row { display: flex; gap: 6px; }
  #filter-row select { flex: 1; }
  #filter-count { font-size: 10px; color: #bbb; text-align: right; }
  #school-list { flex: 1; overflow-y: auto; }
  .school-row {
    padding: 10px 14px; border-bottom: 1px solid #f5f5f0; cursor: pointer;
    border-left: 3px solid transparent; transition: all .1s;
  }
  .school-row:hover { background: #fafaf6; }
  .school-row.active { background: #fffbee; border-left-color: #b8860b; }
  .sr-top { display: flex; align-items: center; gap: 6px; }
  .sr-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .sr-name { font-size: 13px; font-weight: 600; color: #1a1a2e; flex: 1; }
  .sr-se { font-size: 9px; font-weight: 800; color: #b8860b; letter-spacing: .06em; }
  .sr-sub { font-size: 10px; color: #bbb; margin-top: 2px; padding-left: 13px; }
  .sr-coach { color: #777; }

  /* ── RIGHT DETAIL ── */
  #detail-panel { flex: 1; overflow-y: auto; padding: 28px; }
  #detail-panel.empty {
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
  }
  #empty-msg { font-size: 16px; color: #ccc; font-weight: 700; }
  #empty-sub { font-size: 13px; color: #ddd; }
  #detail-inner { max-width: 680px; }

  /* School title bar */
  #school-title-bar { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; }
  #school-name-wrap h2 { font-size: 22px; color: #1a1a2e; display: flex; align-items: center; gap: 10px; }
  .se-badge {
    font-size: 9px; font-weight: 800; color: #b8860b;
    background: rgba(184,134,11,.1); border: 1px solid rgba(184,134,11,.3);
    border-radius: 4px; padding: 2px 7px; letter-spacing: .08em;
  }
  #school-meta { font-size: 13px; color: #999; margin-top: 3px; }
  #staff-link {
    display: inline-flex; align-items: center; gap: 6px;
    background: #f0f0ea; border: 1px solid #ddd; border-radius: 8px;
    padding: 9px 15px; font-size: 12px; color: #555;
    text-decoration: none; font-weight: 700; flex-shrink: 0;
    transition: all .15s;
  }
  #staff-link:hover { background: #e8e8e0; }

  /* Status pills */
  #status-row { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
  .status-pill {
    border-radius: 20px; padding: 5px 15px; font-size: 11px;
    cursor: pointer; font-weight: 700; border: 1.5px solid;
    font-family: Georgia, serif; transition: all .15s;
  }

  /* Cards */
  .card {
    background: #fff; border: 1px solid #e8e8e0; border-radius: 10px;
    padding: 20px; margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.04);
  }
  .card-title {
    font-size: 11px; font-weight: 800; letter-spacing: .1em;
    text-transform: uppercase; color: #b8860b; margin-bottom: 14px;
  }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-field label { font-size: 10px; color: #bbb; text-transform: uppercase; letter-spacing: .05em; display: block; margin-bottom: 5px; }
  .form-field input, .form-field textarea {
    width: 100%; background: #fafaf6; border: 1px solid #e0e0d8;
    border-radius: 7px; padding: 9px 11px; font-size: 13px; color: #333;
    font-family: Georgia, serif;
  }
  .form-field textarea { resize: vertical; }
  .form-field.full { grid-column: 1 / -1; }

  /* Email block */
  #email-card { transition: background .3s, border-color .3s; }
  #email-card.sent-state { background: #fffbee; border-color: #d4a843; }
  #email-preview-toggle { background: none; border: none; font-size: 11px; color: #bbb; cursor: pointer; font-family: Georgia, serif; }
  #email-preview {
    background: #fafaf6; border: 1px solid #e8e8e0; border-radius: 7px;
    padding: 14px; font-size: 11.5px; line-height: 1.75; color: #444;
    white-space: pre-wrap; word-break: break-word; margin-bottom: 14px;
    font-family: Georgia, serif; display: none;
  }
  #email-preview.visible { display: block; }
  #email-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn {
    flex: 1; min-width: 120px; border-radius: 8px; padding: 11px;
    font-size: 13px; font-weight: 700; cursor: pointer; border: none;
    font-family: Georgia, serif; text-align: center; text-decoration: none;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: all .15s;
  }
  .btn-copy { background: #f5f5f0; border: 1px solid #ddd; color: #555; }
  .btn-copy.copied { background: #f0faf4; border-color: #4caf7d; color: #2e7d52; }
  .btn-mail { background: #fffbee; border: 1px solid #d4a843; color: #7a6000; }
  .btn-sent { background: linear-gradient(135deg,#b8860b,#9a7009); color: #fff; }
  .btn-responded { background: linear-gradient(135deg,#2e8b57,#1e6b3a); color: #fff; }
  .btn-skip { background: none; border: none; font-size: 11px; color: #ccc; cursor: pointer; font-family: Georgia, serif; margin-top: 8px; display: block; }
  #no-email-tip {
    background: rgba(184,134,11,.06); border: 1px solid rgba(184,134,11,.15);
    border-radius: 6px; padding: 8px 12px; font-size: 11px; color: #b8860b;
    margin-top: 10px; display: none;
  }
  #sent-date { font-size: 11px; color: #bbb; margin-top: 6px; }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; right: 24px;
    background: #1a1a2e; color: #fff; border-radius: 8px;
    padding: 12px 20px; font-size: 13px; font-weight: 600;
    opacity: 0; transform: translateY(10px);
    transition: all .25s; pointer-events: none; z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  /* Login modal */
  #login-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.5); z-index: 500;
    align-items: center; justify-content: center;
  }
  #login-overlay.show { display: flex; }
  #login-box {
    background: #fff; border-radius: 12px; padding: 32px;
    width: 320px; box-shadow: 0 20px 60px rgba(0,0,0,.2);
  }
  #login-box h3 { font-size: 18px; margin-bottom: 16px; color: #1a1a2e; }
  #login-box input {
    width: 100%; border: 1px solid #e0e0d8; border-radius: 8px;
    padding: 10px 12px; font-size: 14px; margin-bottom: 12px;
    font-family: Georgia, serif;
  }
  #login-box button {
    width: 100%; background: linear-gradient(135deg,#b8860b,#9a7009);
    border: none; border-radius: 8px; padding: 12px;
    color: #fff; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: Georgia, serif;
  }
  #login-error { font-size: 12px; color: #c0392b; margin-top: 8px; display: none; }
  #login-cancel { background: none; border: none; font-size: 12px; color: #bbb; cursor: pointer; margin-top: 10px; font-family: Georgia, serif; display: block; text-align: center; width: 100%; }

  /* Loading */
  #loading { text-align: center; padding: 60px; color: #bbb; font-size: 14px; }

  /* ── ROSTER NEEDS ── */
  .need-row {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 12px; background: #f8f8f4;
    border: 1px solid #e8e8e0; border-radius: 8px; margin-bottom: 8px;
  }
  .need-pos {
    background: rgba(184,134,11,.12); border: 1px solid rgba(184,134,11,.3);
    color: #7a5500; font-size: 11px; font-weight: 800; letter-spacing: .06em;
    border-radius: 5px; padding: 3px 9px; flex-shrink: 0;
  }
  .need-slots { font-size: 12px; color: #555; flex: 1; }
  .need-priority-high   { font-size: 10px; font-weight: 800; color: #b03030; }
  .need-priority-medium { font-size: 10px; font-weight: 800; color: #b8860b; }
  .need-priority-low    { font-size: 10px; font-weight: 800; color: #999; }
  .need-delete {
    background: none; border: none; color: #ddd; font-size: 15px;
    cursor: pointer; padding: 0 2px; line-height: 1; font-family: Georgia, serif;
    transition: color .15s;
  }
  .need-delete:hover { color: #c0392b; }
  #add-need-form {
    display: none; background: rgba(184,134,11,.05);
    border: 1px solid rgba(184,134,11,.2); border-radius: 8px;
    padding: 14px; margin-top: 10px;
  }
  #add-need-form.visible { display: block; }
  .need-form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .need-form-row select, .need-form-row input {
    background: #fff; border: 1px solid #e0e0d8; border-radius: 6px;
    padding: 7px 9px; font-size: 12px; color: #333; font-family: Georgia, serif;
  }
  .need-form-btns { display: flex; gap: 8px; }
  .btn-add-need {
    flex: 1; background: rgba(184,134,11,.15); border: 1px solid rgba(184,134,11,.4);
    color: #7a5500; border-radius: 6px; padding: 8px; font-size: 12px;
    font-weight: 700; cursor: pointer; font-family: Georgia, serif;
  }
  .btn-cancel-need {
    background: #f5f5f0; border: 1px solid #ddd; color: #999;
    border-radius: 6px; padding: 8px 14px; font-size: 12px;
    cursor: pointer; font-family: Georgia, serif;
  }
  .needs-empty { font-size: 12px; color: #bbb; text-align: center; padding: 14px 0; }
  .needs-locked { font-size: 11px; color: #bbb; margin-top: 8px; }
  /* badge on list row */
  .sr-needs { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 3px; padding-left: 13px; }
  .sr-need-badge {
    font-size: 9px; font-weight: 800; color: #7a5500;
    background: rgba(184,134,11,.1); border: 1px solid rgba(184,134,11,.25);
    border-radius: 3px; padding: 1px 5px; letter-spacing: .04em;
  }

  /* SE states highlight */
  .se-state { font-weight: 700; color: #b8860b; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #e0e0d8; border-radius: 3px; }

  @media (max-width: 768px) {
    #list-panel { width: 100%; }
    #detail-panel { display: none; }
    #detail-panel.mobile-show { display: block; }
    #app { flex-direction: column; height: auto; }
  }
</style>
</head>
<body>

<!-- ── HEADER ── -->
<div id="header">
  <div id="header-inner">
    <div id="brand">
      <span id="brand-name">Arcane Baseball</span>
      <span style="color:#ddd">|</span>
      <span id="brand-sub">Coach Outreach</span>
    </div>
    <div style="display:flex;align-items:center;gap:24px">
      <div id="header-progress">
        <div class="prog-wrap">
          <div class="prog-label"><span>Southeast</span><span id="se-prog-txt">0/0</span></div>
          <div class="prog-bar"><div class="prog-fill" id="se-prog-bar" style="width:0%"></div></div>
        </div>
        <div class="prog-wrap">
          <div class="prog-label"><span>All D1</span><span id="all-prog-txt">0/300</span></div>
          <div class="prog-bar"><div class="prog-fill" id="all-prog-bar" style="width:0%;background:#ddd"></div></div>
        </div>
      </div>
      <div id="header-stats">
        <div class="hstat"><div class="hstat-num" id="stat-sent">0</div><div class="hstat-lbl">Sent</div></div>
        <div class="hstat"><div class="hstat-num" id="stat-responded">0</div><div class="hstat-lbl">Responded</div></div>
        <div class="hstat"><div class="hstat-num" id="stat-emails">0</div><div class="hstat-lbl">Emails</div></div>
      </div>
      <button id="admin-btn" onclick="toggleLogin()">Admin Login</button>
    </div>
  </div>
  <div id="header-tabs">
    <button class="htab active" onclick="setTab('outreach')">Outreach Queue</button>
    <button class="htab" onclick="setTab('responded')">Responded</button>
    <button class="htab" onclick="setTab('all')">All Schools</button>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">

  <!-- LEFT: School List -->
  <div id="list-panel">
    <div id="filters">
      <input type="text" id="search-input" placeholder="Search school or city..." oninput="renderList()" />
      <div id="filter-row">
        <select id="region-filter" onchange="renderList()">
          <option value="se">Southeast First</option>
          <option value="all">All States</option>
          <option value="SC">South Carolina</option>
          <option value="NC">North Carolina</option>
          <option value="GA">Georgia</option>
          <option value="FL">Florida</option>
          <option value="TN">Tennessee</option>
          <option value="AL">Alabama</option>
          <option value="VA">Virginia</option>
          <option value="MS">Mississippi</option>
          <option value="LA">Louisiana</option>
          <option value="AR">Arkansas</option>
          <option value="KY">Kentucky</option>
          <option value="TX">Texas</option>
          <option value="OTHER">Other States</option>
        </select>
        <select id="status-filter" onchange="renderList()">
          <option value="todo">To Contact</option>
          <option value="sent">Sent</option>
          <option value="responded">Responded</option>
          <option value="all_s">All Statuses</option>
        </select>
      </div>
      <div id="filter-count">— schools</div>
    </div>
    <div id="school-list"><div id="loading">Loading schools...</div></div>
  </div>

  <!-- RIGHT: Detail / Action -->
  <div id="detail-panel" class="empty">
    <div style="font-size:40px">⚾</div>
    <div id="empty-msg">Select a school to begin</div>
    <div id="empty-sub">Southeast programs are loaded first</div>
  </div>
</div>

<!-- ── LOGIN MODAL ── -->
<div id="login-overlay">
  <div id="login-box">
    <h3>Admin Login</h3>
    <input type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()" />
    <button onclick="doLogin()">Log In</button>
    <div id="login-error">Incorrect password</div>
    <button id="login-cancel" onclick="closeLogin()">Cancel</button>
  </div>
</div>

<!-- ── TOAST ── -->
<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════
// CONFIG — replace with your Supabase credentials
// ══════════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://tkcidrbydqehbohbzqra.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrY2lkcmJ5ZHFlaGJvaGJ6cXJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NDg0NDksImV4cCI6MjA4ODMyNDQ0OX0.pM-KqkWRX3K2LKSeZLOYXFcCM5egMS7mPXmccfW1I5o';
const ADMIN_PASSWORD = 'arcane2024';

const SE_STATES = ['SC','NC','GA','FL','TN','AL','VA','MS','LA','AR','KY'];

// ── INIT ──────────────────────────────────────────────────────
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allSchools = [];
let activeId = null;
let isAdmin = false;
let currentTab = 'outreach';
let emailPreviewOpen = false;
let copyTimer = null;

// ── BOOT ─────────────────────────────────────────────────────
async function boot() {
  const { data, error } = await supabase
    .from('coach_outreach')
    .select('*')
    .order('id', { ascending: true });

  if (error) {
    document.getElementById('loading').textContent = 'Error loading data. Check Supabase credentials.';
    console.error(error);
    return;
  }

  // Parse roster_needs from JSON string if needed
  allSchools = data.map(s => ({
    ...s,
    roster_needs: Array.isArray(s.roster_needs) ? s.roster_needs
      : (s.roster_needs ? JSON.parse(s.roster_needs) : [])
  }));
  renderList();
  updateStats();

  // Auto-select first todo SE school
  const first = allSchools.find(s => SE_STATES.includes(s.state) && s.status === 'todo');
  if (first) selectSchool(first.id);
}

// ── EMAIL TEMPLATE ────────────────────────────────────────────
function buildEmail(school) {
  const yr = new Date().getFullYear() + 1;
  const lastName = school.head_coach
    ? school.head_coach.trim().split(' ').filter(Boolean).pop()
    : '[Last Name]';
  return `Coach ${lastName},

My name is Bryan Anderson, Founder and CEO of Arcane Baseball in Columbia, SC. I'm a former MLB catcher with 12+ years of professional experience, including World Series championships and a USA Baseball Gold Medal.

At Arcane Baseball, we train and develop elite prospects using professional-grade technology — TrackMan, HitTrax, and BaseballCloud. Every athlete in our system is evaluated not just on physical metrics, but on character, coachability, and competitive makeup.

As you build your ${yr} recruiting class at ${school.school_name}, I'd love to understand your roster needs:

  • What positions are you prioritizing in the upcoming class?
  • Are there specific measurables or academic thresholds we should know about?
  • Would you be open to receiving verified data profiles on players who match your criteria?

We maintain a live prospect database at players.arcanebaseball.com where you can view metrics and full athlete profiles at any time. I'd be glad to personally curate a short list that fits exactly what you're looking for.

I look forward to building a relationship with ${school.school_name}'s program.

Best,
Bryan Anderson
Founder & CEO | Arcane Baseball
1200 Heyward Street, Columbia, SC 29205
arcanebaseball.com | players.arcanebaseball.com`;
}

// ── STATS ─────────────────────────────────────────────────────
function updateStats() {
  const se = allSchools.filter(s => SE_STATES.includes(s.state));
  const seSent = se.filter(s => s.status === 'sent' || s.status === 'responded').length;
  const totalSent = allSchools.filter(s => s.status === 'sent').length;
  const totalResp = allSchools.filter(s => s.status === 'responded').length;
  const withEmail = allSchools.filter(s => s.head_email).length;
  const total = allSchools.length;
  const totalContacted = totalSent + totalResp;

  document.getElementById('stat-sent').textContent = totalSent;
  document.getElementById('stat-responded').textContent = totalResp;
  document.getElementById('stat-emails').textContent = withEmail;
  document.getElementById('se-prog-txt').textContent = `${seSent}/${se.length}`;
  document.getElementById('all-prog-txt').textContent = `${totalContacted}/${total}`;
  document.getElementById('se-prog-bar').style.width = se.length ? `${Math.round(seSent/se.length*100)}%` : '0%';
  document.getElementById('all-prog-bar').style.width = total ? `${Math.round(totalContacted/total*100)}%` : '0%';
}

// ── FILTER / RENDER LIST ──────────────────────────────────────
function getFilteredList() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const region = document.getElementById('region-filter').value;
  const statusF = document.getElementById('status-filter').value;

  return allSchools.filter(s => {
    if (q && !s.school_name.toLowerCase().includes(q) && !s.city.toLowerCase().includes(q)) return false;
    if (region === 'se') { /* SE first handled by sort */ }
    else if (region === 'all') { /* no filter */ }
    else if (region === 'OTHER') { if (SE_STATES.includes(s.state)) return false; }
    else if (s.state !== region) return false;

    if (statusF === 'todo' && s.status !== 'todo') return false;
    if (statusF === 'sent' && s.status !== 'sent') return false;
    if (statusF === 'responded' && s.status !== 'responded') return false;
    return true;
  }).sort((a, b) => {
    // SE states first when region === 'se'
    if (region === 'se') {
      const ase = SE_STATES.includes(a.state) ? 0 : 1;
      const bse = SE_STATES.includes(b.state) ? 0 : 1;
      if (ase !== bse) return ase - bse;
      // Within SE, sort by state order
      const ai = SE_STATES.indexOf(a.state);
      const bi = SE_STATES.indexOf(b.state);
      if (ai !== bi) return ai - bi;
    }
    return a.id - b.id;
  });
}

const STATUS_DOT = { todo:'#ccc', sent:'#d4a843', responded:'#4caf7d', skip:'#ddd' };

function renderList() {
  const list = getFilteredList();
  document.getElementById('filter-count').textContent = `${list.length} programs`;

  const container = document.getElementById('school-list');
  if (list.length === 0) {
    container.innerHTML = '<div style="padding:32px;text-align:center;color:#bbb;font-size:13px">No schools match filters</div>';
    return;
  }

  container.innerHTML = list.map(s => {
    const isSE = SE_STATES.includes(s.state);
    const isActive = s.id === activeId;
    const needs = s.roster_needs || [];
    const needBadges = needs.length > 0
      ? `<div class="sr-needs">${needs.map(n => `<span class="sr-need-badge">${n.position}</span>`).join('')}</div>`
      : '';
    return `<div class="school-row${isActive?' active':''}" onclick="selectSchool(${s.id})">
      <div class="sr-top">
        <div class="sr-dot" style="background:${STATUS_DOT[s.status]||'#ccc'}"></div>
        <span class="sr-name">${s.school_name}</span>
        ${isSE ? '<span class="sr-se">SE</span>' : ''}
      </div>
      <div class="sr-sub">${s.conf} · ${s.city}, <span class="${isSE?'se-state':''}">${s.state}</span>${s.head_coach ? ` · <span class="sr-coach">${s.head_coach}</span>` : ''}</div>
      ${needBadges}
    </div>`;
  }).join('');
}

// ── SELECT SCHOOL ─────────────────────────────────────────────
function selectSchool(id) {
  activeId = id;
  renderList(); // update active highlight
  renderDetail();
}

// ── DETAIL RENDER ─────────────────────────────────────────────
const STATUS_CONFIG = {
  todo:      { label: 'To Contact',       color: '#888',   bg: '#f0f0ea', border: '#ddd' },
  sent:      { label: 'Sent',             color: '#7a6000', bg: '#fffbee', border: '#d4a843' },
  responded: { label: 'Responded',        color: '#1e6b3a', bg: '#f0faf4', border: '#4caf7d' },
  skip:      { label: 'Skip',             color: '#bbb',   bg: '#f8f8f8', border: '#e8e8e0' },
};

function renderDetail() {
  const s = allSchools.find(x => x.id === activeId);
  if (!s) return;

  const panel = document.getElementById('detail-panel');
  panel.classList.remove('empty');
  const isSE = SE_STATES.includes(s.state);
  const emailBody = buildEmail(s);
  const mailtoHref = s.head_email
    ? `mailto:${s.head_email}?subject=Arcane Baseball – Elite Prospects for Your ${new Date().getFullYear()+1} Roster&body=${encodeURIComponent(emailBody)}`
    : '#';

  panel.innerHTML = `<div id="detail-inner">
    <!-- Title -->
    <div id="school-title-bar">
      <div id="school-name-wrap">
        <h2>${s.school_name}${isSE ? '<span class="se-badge">SOUTHEAST</span>' : ''}</h2>
        <div id="school-meta">${s.conf} · ${s.city}, ${s.state}</div>
      </div>
      <a href="${s.site}" target="_blank" id="staff-link">🔗 Open Staff Page</a>
    </div>

    <!-- Status Pills -->
    <div id="status-row">
      ${Object.entries(STATUS_CONFIG).map(([key, cfg]) => `
        <button class="status-pill" onclick="setStatus(${s.id},'${key}')"
          style="background:${s.status===key?cfg.bg:'#f8f8f4'};border-color:${s.status===key?cfg.border:'#e8e8e0'};color:${s.status===key?cfg.color:'#aaa'}">
          ${cfg.label}
        </button>`).join('')}
      ${s.sent_date ? `<span style="font-size:11px;color:#bbb;align-self:center;margin-left:4px">Sent ${s.sent_date}</span>` : ''}
    </div>

    <!-- Coach Info Card -->
    <div class="card">
      <div class="card-title">Head Coach Info</div>
      <div class="form-grid">
        <div class="form-field">
          <label>Coach Name</label>
          <input type="text" id="f-coach" value="${esc(s.head_coach)}" placeholder="First Last"
            ${isAdmin?'':'readonly'} oninput="localUpdate(${s.id},'head_coach',this.value)" />
        </div>
        <div class="form-field">
          <label>Coach Email</label>
          <input type="email" id="f-email" value="${esc(s.head_email)}" placeholder="coach@school.edu"
            ${isAdmin?'':'readonly'} oninput="localUpdate(${s.id},'head_email',this.value)" />
        </div>
        <div class="form-field full">
          <label>Notes / Roster Needs</label>
          <textarea id="f-notes" rows="3" placeholder="Roster needs, recruiting priorities, prior conversations..."
            ${isAdmin?'':'readonly'} oninput="localUpdate(${s.id},'notes',this.value)">${esc(s.notes)}</textarea>
        </div>
      </div>
      ${isAdmin ? `<button onclick="saveCoachInfo(${s.id})" style="margin-top:12px;background:linear-gradient(135deg,#b8860b,#9a7009);border:none;border-radius:7px;padding:9px 20px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:Georgia,serif">💾 Save Info</button>` : '<div style="font-size:11px;color:#bbb;margin-top:10px">Log in as admin to edit coach info</div>'}
    </div>

    <!-- Roster Needs Card -->
    <div class="card" id="needs-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div class="card-title" style="margin-bottom:0">Roster Needs</div>
        ${isAdmin ? `<button onclick="toggleAddNeed()" style="background:rgba(184,134,11,.1);border:1px solid rgba(184,134,11,.3);color:#7a5500;border-radius:6px;padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:Georgia,serif">+ Add Need</button>` : ''}
      </div>
      <div id="needs-list">
        ${(s.roster_needs && s.roster_needs.length > 0)
          ? s.roster_needs.map((n, i) => `
            <div class="need-row">
              <span class="need-pos">${n.position}</span>
              <span class="need-slots">${n.slots} slot${n.slots !== 1 ? 's' : ''}${n.note ? ' · ' + esc(n.note) : ''}</span>
              <span class="need-priority-${n.priority}">${n.priority.toUpperCase()}</span>
              ${isAdmin ? `<button class="need-delete" onclick="deleteNeed(${s.id},${i})" title="Remove">×</button>` : ''}
            </div>`).join('')
          : `<div class="needs-empty">${s.status === 'responded' ? 'Coach responded — log their roster needs above' : 'No needs logged yet. These appear once a coach responds.'}</div>`
        }
      </div>
      ${isAdmin ? `
      <div id="add-need-form">
        <div class="need-form-row">
          <select id="need-pos">
            <option value="">Position</option>
            ${['C','1B','2B','3B','SS','OF','SP','RP','DH','UTL'].map(p => `<option>${p}</option>`).join('')}
          </select>
          <select id="need-slots">
            ${[1,2,3].map(n => `<option value="${n}">${n} slot${n>1?'s':''}</option>`).join('')}
          </select>
          <select id="need-priority">
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </div>
        <input type="text" id="need-note" placeholder="Notes (optional — e.g. must throw 88+)" style="width:100%;background:#fff;border:1px solid #e0e0d8;border-radius:6px;padding:7px 9px;font-size:12px;color:#333;font-family:Georgia,serif;margin-bottom:10px" />
        <div class="need-form-btns">
          <button class="btn-add-need" onclick="saveNeed(${s.id})">Save Need</button>
          <button class="btn-cancel-need" onclick="toggleAddNeed()">Cancel</button>
        </div>
      </div>` : `<div class="needs-locked">Log in as admin to add roster needs</div>`}
    </div>

    <!-- Email Card -->
    <div class="card${s.status==='sent'?' sent-state':''}" id="email-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div class="card-title" style="margin-bottom:0">Outreach Email</div>
        <button id="preview-btn" class="email-preview-toggle" onclick="toggleEmailPreview()">▼ Preview email</button>
      </div>
      <div id="email-preview">${emailBody.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
      <div id="email-actions">
        <button class="btn btn-copy" id="copy-btn" onclick="copyEmail(${s.id})">📋 Copy Email</button>
        ${s.head_email ? `<a class="btn btn-mail" href="${mailtoHref}" target="_blank">✉ Open in Mail</a>` : ''}
        ${s.status==='todo'||s.status==='skip' ? `<button class="btn btn-sent" onclick="markSent(${s.id})">✓ Mark Sent →</button>` : ''}
        ${s.status==='sent' ? `<button class="btn btn-responded" onclick="setStatus(${s.id},'responded')">✓ Mark Responded</button>` : ''}
      </div>
      ${!s.head_email ? `<div id="no-email-tip" style="display:block">💡 Enter coach email above to unlock the "Open in Mail" button — pre-fills everything and opens your email client ready to send.</div>` : ''}
    </div>
    <button class="btn-skip" onclick="skipSchool(${s.id})">Skip this school →</button>
  </div>`;

  // Restore email preview state
  if (emailPreviewOpen) {
    document.getElementById('email-preview').classList.add('visible');
    document.getElementById('preview-btn').textContent = '▲ Hide email';
  }
}

// ── ACTIONS ──────────────────────────────────────────────────

function toggleEmailPreview() {
  emailPreviewOpen = !emailPreviewOpen;
  const el = document.getElementById('email-preview');
  const btn = document.getElementById('preview-btn');
  if (el) el.classList.toggle('visible', emailPreviewOpen);
  if (btn) btn.textContent = emailPreviewOpen ? '▲ Hide email' : '▼ Preview email';
}

function localUpdate(id, field, value) {
  const s = allSchools.find(x => x.id === id);
  if (s) s[field] = value;
}

async function saveCoachInfo(id) {
  const s = allSchools.find(x => x.id === id);
  if (!s) return;
  const { error } = await supabase.from('coach_outreach').update({
    head_coach: s.head_coach,
    head_email: s.head_email,
    notes: s.notes,
    updated_at: new Date().toISOString(),
  }).eq('id', id);
  if (error) { toast('Error saving — check connection'); console.error(error); return; }
  toast('✓ Coach info saved');
  updateStats();
  renderList();
}

async function setStatus(id, status) {
  if (!isAdmin) { toast('Log in as admin to change status'); return; }
  const updates = { status, updated_at: new Date().toISOString() };
  const { error } = await supabase.from('coach_outreach').update(updates).eq('id', id);
  if (error) { toast('Error updating status'); console.error(error); return; }
  const s = allSchools.find(x => x.id === id);
  if (s) s.status = status;
  updateStats();
  renderList();
  renderDetail();
}

async function markSent(id) {
  if (!isAdmin) { toast('Log in as admin to mark as sent'); return; }
  const today = new Date().toISOString().split('T')[0];
  const { error } = await supabase.from('coach_outreach').update({
    status: 'sent', sent_date: today, updated_at: new Date().toISOString()
  }).eq('id', id);
  if (error) { toast('Error saving'); console.error(error); return; }
  const s = allSchools.find(x => x.id === id);
  if (s) { s.status = 'sent'; s.sent_date = today; }
  toast('✓ Marked as sent');
  updateStats();
  renderList();
  // Auto-advance to next todo school in filtered list
  const list = getFilteredList();
  const idx = list.findIndex(x => x.id === id);
  const next = list.slice(idx + 1).find(x => x.status === 'todo');
  if (next) selectSchool(next.id);
  else renderDetail();
}

async function skipSchool(id) {
  await setStatus(id, 'skip');
  const list = getFilteredList();
  const idx = list.findIndex(x => x.id === id);
  const next = list.slice(idx + 1).find(x => x.status === 'todo');
  if (next) selectSchool(next.id);
}

function copyEmail(id) {
  const s = allSchools.find(x => x.id === id);
  if (!s) return;
  navigator.clipboard.writeText(buildEmail(s)).then(() => {
    const btn = document.getElementById('copy-btn');
    if (btn) { btn.textContent = '✓ Copied!'; btn.classList.add('copied'); }
    clearTimeout(copyTimer);
    copyTimer = setTimeout(() => {
      if (btn) { btn.textContent = '📋 Copy Email'; btn.classList.remove('copied'); }
    }, 2200);
  });
}

// ── TAB SWITCHING ────────────────────────────────────────────
function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.htab').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const sf = document.getElementById('status-filter');
  if (tab === 'outreach') sf.value = 'todo';
  else if (tab === 'responded') sf.value = 'responded';
  else sf.value = 'all_s';
  renderList();
}

// ── ADMIN AUTH ───────────────────────────────────────────────
function toggleLogin() {
  if (isAdmin) {
    isAdmin = false;
    document.getElementById('admin-btn').textContent = 'Admin Login';
    document.getElementById('admin-btn').classList.remove('active');
    toast('Logged out');
    if (activeId) renderDetail();
  } else {
    document.getElementById('login-overlay').classList.add('show');
    setTimeout(() => document.getElementById('pw-input').focus(), 100);
  }
}

function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (pw === ADMIN_PASSWORD) {
    isAdmin = true;
    document.getElementById('admin-btn').textContent = '✓ Admin';
    document.getElementById('admin-btn').classList.add('active');
    closeLogin();
    toast('✓ Admin access granted');
    if (activeId) renderDetail();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

function closeLogin() {
  document.getElementById('login-overlay').classList.remove('show');
  document.getElementById('pw-input').value = '';
  document.getElementById('login-error').style.display = 'none';
}

// ── TOAST ────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ── HELPERS ──────────────────────────────────────────────────
function esc(str) {
  return (str || '').replace(/"/g, '&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── ROSTER NEEDS ─────────────────────────────────────────────

function toggleAddNeed() {
  const form = document.getElementById('add-need-form');
  if (form) form.classList.toggle('visible');
}

async function saveNeed(schoolId) {
  const pos      = document.getElementById('need-pos').value;
  const slots    = parseInt(document.getElementById('need-slots').value) || 1;
  const priority = document.getElementById('need-priority').value;
  const note     = document.getElementById('need-note').value.trim();

  if (!pos) { toast('Select a position first'); return; }

  const s = allSchools.find(x => x.id === schoolId);
  if (!s) return;

  const needs = [...(s.roster_needs || []), { position: pos, slots, priority, note }];

  const { error } = await supabase.from('coach_outreach').update({
    roster_needs: needs,
    updated_at: new Date().toISOString(),
  }).eq('id', schoolId);

  if (error) { toast('Error saving need'); console.error(error); return; }

  s.roster_needs = needs;
  toast(`✓ Added ${pos} need`);
  renderList();
  renderDetail();
}

async function deleteNeed(schoolId, index) {
  const s = allSchools.find(x => x.id === schoolId);
  if (!s) return;

  const needs = (s.roster_needs || []).filter((_, i) => i !== index);

  const { error } = await supabase.from('coach_outreach').update({
    roster_needs: needs,
    updated_at: new Date().toISOString(),
  }).eq('id', schoolId);

  if (error) { toast('Error removing need'); console.error(error); return; }

  s.roster_needs = needs;
  toast('Need removed');
  renderList();
  renderDetail();
}

// ── START ────────────────────────────────────────────────────
boot();
</script>
